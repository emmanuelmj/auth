name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    services:
      postgres:
        image: ${{ matrix.os == 'ubuntu-latest' && 'postgres:16' || '' }}
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testauth
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PostgreSQL (Windows & macOS)
        if: matrix.os != 'ubuntu-latest'
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          username: testuser
          password: testpass
          database: testauth

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Build SMTP Mock (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p bin
          g++ cpp/smtp_mock.cpp -o bin/smtp_mock

      - name: Build SMTP Mock (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p bin
          g++ cpp/smtp_mock.cpp -o bin/smtp_mock.exe

      - name: Verify go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Check formatting
        shell: bash
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files need formatting:"
            gofmt -l .
            exit 1
          fi

      - name: Build
        run: go build -v ./...

      - name: Run Tests
        run: go test -v -race ./...
