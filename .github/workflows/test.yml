name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PostgreSQL
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          username: testuser
          password: testpass
          database: testauth

      - name: Setup Redis
        uses: shogo82148/actions-setup-redis@v1
        with:
          redis-version: '7'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Setup MinGW (Windows)
        if: runner.os == 'Windows'
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64

      - name: Build SMTP Mock (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p bin
          g++ cpp/smtp_mock.cpp -o bin/smtp_mock

      - name: Build SMTP Mock (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p bin
          g++ cpp/smtp_mock.cpp -o bin/smtp_mock.exe

      - name: Verify go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Check formatting
        shell: bash
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files need formatting:"
            gofmt -l .
            exit 1
          fi

      - name: Build
        run: go build -v ./...

      - name: Run Tests
        run: go test -v -race ./...
