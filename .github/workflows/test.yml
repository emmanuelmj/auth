name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Build SMTP mock
        shell: bash
        run: |
          mkdir -p bin
          g++ cpp/smtp_mock.cpp -o bin/smtp_mock
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            mv bin/smtp_mock bin/smtp_mock.exe
          fi

      - name: Verify go.mod tidy
        shell: bash
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Check formatting
        shell: bash
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files need formatting:"
            gofmt -l .
            exit 1
          fi

      - name: Build
        run: go build -v ./...

      - name: Test with race detector
        run: go test -v -race ./...
